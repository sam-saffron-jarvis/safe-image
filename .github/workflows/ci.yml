name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev imagemagick jpegoptim pngquant
          if ! command -v oxipng >/dev/null; then
            cargo install oxipng --locked
            sudo install -m 0755 "$HOME/.cargo/bin/oxipng" /usr/local/bin/oxipng
          fi
          command -v convert identify jpegoptim oxipng pngquant
      - name: Run tests
        run: bundle exec rake
